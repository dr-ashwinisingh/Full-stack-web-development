<!DOCTYPE html>
<html>
<head>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

<h2>jQuery Demo</h2>

<button id="btn">Click Me</button>

<p id="text">Welcome to jQuery class</p>

<script>

$(document).ready(function(){

$("#btn").click(function(){

$("#text").hide();

});

});

</script>

</body>
</html>
