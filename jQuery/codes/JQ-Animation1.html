<!DOCTYPE html>
<html>
<head>

<title>jQuery Animation Example</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

#box{
width:100px;
height:100px;
background-color:blue;
position:relative;
}

</style>

</head>

<body>

<h2>jQuery Animation Demo</h2>

<button id="btn">Start Animation</button>

<br><br>

<div id="box"></div>

<script>

$(document).ready(function(){

$("#btn").click(function(){

$("#box").animate({
left:'300px',
height:'150px',
width:'150px'
});

});

});

</script>

</body>
</html>
