<!DOCTYPE html>
<html>
<head>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

<h2>Student Data</h2>

<button id="btn">Load Students</button>

<ul id="list"></ul>

<script>

$(document).ready(function(){

$("#btn").click(function(){

$.getJSON("students.json", function(data){

var output="";

$.each(data.students,function(i,student){

output += "<li>" + student.id + " "
+ student.name + " "
+ student.course + "</li>";

});

$("#list").html(output);

});

});

});

</script>

</body>
</html>
